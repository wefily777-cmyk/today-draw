<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天給你抽 - 會員註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clay: '#D0826C',   /* 落日陶土橘 */
                        forest: '#2E4A3F', /* 森林深綠 */
                        sand: '#FAF8F5',   /* 大地奶色 */
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-forest tracking-wider mb-2">今天給你抽</h1>
            <p class="text-sm text-gray-500">開啟你的尋香之旅，請先填寫會員資料</p>
        </div>

        <form id="registerForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件 (帳號)</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="example@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">設定密碼</label>
                <input type="password" id="password" required minlength="6" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="至少 6 位數密碼">
            </div>

            <hr class="border-gray-200 my-4">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">真實姓名</label>
                <input type="text" id="fullName" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="請輸入姓名">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" id="phone" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="0912345678">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">寄送地址</label>
                <input type="text" id="address" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="請輸入完整的商品收件地址">
            </div>

            <button type="submit" class="w-full bg-forest text-white py-3 rounded-lg font-medium hover:bg-opacity-90 transition duration-300 shadow-md">
                加入會員，開始抽精油
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🔥 你的專屬 Firebase 專案設定資訊
        const firebaseConfig = {
            apiKey: "AIzaSyAq5b6zOX6Czu88eCTWHitKSu7mLnqyxbY",
            authDomain: "today-draw-365ed.firebaseapp.com",
            projectId: "today-draw-365ed",
            storageBucket: "today-draw-365ed.firebasestorage.app",
            messagingSenderId: "118558159958",
            appId: "1:118558159958:web:11f552d3a454128f1837f7",
            measurementId: "G-H37FG8S08X"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 監聽表單送出事件
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 防止網頁重整

            // 抓取欄位數值
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            try {
                // 1. 先透過 Firebase Auth 建立帳號
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. 帳號建立成功後，用該用戶的 UID 作為文件 ID，把詳細資料存入 Firestore 的 "members" 集合
                await setDoc(doc(db, "members", user.uid), {
                    uid: user.uid,
                    email: email,
                    fullName: fullName,
                    phone: phone,
                    address: address,
                    createdAt: new Date().toISOString()
                });

                alert('🎉 註冊成功！歡迎加入「今天給你抽」！');
                document.getElementById('registerForm').reset(); // 清空表單

                // 🚀 【升級功能】註冊成功並按下確定後，自動無縫跳轉到首頁
                window.location.href = 'home.html';

            } catch (error) {
                console.error("錯誤細節:", error);
                alert('❌ 註冊失敗：' + error.message);
            }
        });
    </script>
</body>
</html>
