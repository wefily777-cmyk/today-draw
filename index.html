<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玥石之溫 - 完善會員資料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { clay: '#D0826C', forest: '#2E4A3F', sand: '#FAF8F5' }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-forest tracking-wider">玥石之溫</h1>
            <p class="text-gray-400 text-xs mt-2">完善會員資料，即可立刻體驗線上盲盒抽籤與調香預約</p>
        </div>

        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">電子郵件 (帳號)</label>
                <input type="email" id="email" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm bg-gray-50/50">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">設定密碼</label>
                <input type="password" id="password" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm bg-gray-50/50" placeholder="至少 6 位數">
            </div>
            <hr class="border-gray-100 my-2">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">真實姓名</label>
                <input type="text" id="fullName" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" id="phone" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm" placeholder="例如：0912345678">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">寄送地址</label>
                <input type="text" id="address" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm" placeholder="填寫完整收件地址">
            </div>
            
            <!-- 🔗 實體裂變：介紹人填寫欄位 -->
            <div class="bg-sand/40 p-3 rounded-xl border border-dashed border-clay/30">
                <label class="block text-xs font-bold text-clay mb-1">✨ 推薦人編號 (選填)</label>
                <input type="text" id="referrer" class="w-full px-3 py-1.5 border border-gray-200 rounded-lg focus:ring-2 focus:ring-clay outline-none text-sm bg-white" placeholder="例如：YR1234">
                <p class="text-[10px] text-gray-400 mt-1">填寫推薦碼註冊即贈 50 點！也為您的介紹人贏得 100 點獎勵！</p>
            </div>

            <button type="submit" id="regBtn" class="w-full bg-forest text-white py-3 rounded-xl font-medium hover:bg-opacity-95 transition shadow-md text-sm mt-4">
                加入會員，返回體驗
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-6">
            已經是會員了嗎？ <a href="login.html" class="text-clay font-medium hover:underline">立即登入</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, updateDoc, collection, query, where, getDocs, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 🎯 修正版付費專案金鑰 (apiKey 已修正為數字 0)
        const firebaseConfig = {
  apiKey: "AIzaSyD03zBEE275PfxNash3-HsjPRWXGYluI-c".trim().replace("DO3zB", "D03zB"),
  authDomain: "poetry-ai-5dd52.firebaseapp.com",
  projectId: "poetry-ai-5dd52",
  storageBucket: "poetry-ai-5dd52.firebasestorage.app",
  messagingSenderId: "433041548580",
  appId: "1:433041548580:web:43808e3a99ea9fbd123fb1",
  measurementId: "G-D3LY5HJLZG"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const regBtn = document.getElementById('regBtn');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('fullName').value;
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value;
            const referrerInput = document.getElementById('referrer').value.trim().toUpperCase();

            regBtn.disabled = true;
            regBtn.innerText = "⏳ 正在驗證並規劃您的療癒帳戶...";

            try {
                // 🛡️ 【防刷護盾】手機號碼查重
                const phoneCheckQuery = query(collection(db, "members"), where("phone", "==", phone));
                const phoneCheckSnapshot = await getDocs(phoneCheckQuery);

                if (!phoneCheckSnapshot.empty) {
                    alert(`⚠️ 註冊失敗：手機號碼 【${phone}】 已經被其他會員綁定過囉！\n請更換正確的手機號碼，或直接使用原帳號登入。`);
                    regBtn.disabled = false;
                    regBtn.innerText = "加入會員，返回體驗";
                    return;
                }

                let myInitialPoints = 0;
                let targetReferrerUid = "none";
                let referrerDocRef = null;

                // 🔍 檢查推薦人代碼是否存在
                if (referrerInput !== "") {
                    const q = query(collection(db, "members"), where("memberCode", "==", referrerInput));
                    const querySnapshot = await getDocs(q);

                    if (querySnapshot.empty) {
                        alert(`❌ 找不到推薦碼 【${referrerInput}】，請檢查是否輸入正確，或先留空註冊唷！`);
                        regBtn.disabled = false;
                        regBtn.innerText = "加入會員，返回體驗";
                        return;
                    } else {
                        const referrerDoc = querySnapshot.docs[0];
                        targetReferrerUid = referrerDoc.id;
                        referrerDocRef = doc(db, "members", targetReferrerUid);
                        myInitialPoints = 50; // 新人得 50 點
                    }
                }

                // 1. 建立 Auth 帳號
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. 隨機產生自己的 6 碼推廣代碼
                const randomCode = Math.floor(1000 + Math.random() * 9000);
                const myMemberCode = `YR${randomCode}`;

                // 3. 寫入自己的會員文件
                await setDoc(doc(db, "members", user.uid), {
                    uid: user.uid,
                    email: email,
                    fullName: fullName,
                    phone: phone,
                    address: address,
                    memberCode: myMemberCode,
                    referrerCode: referrerInput || "none",
                    referrerUid: targetReferrerUid, 
                    points: myInitialPoints, 
                    createdAt: new Date().toISOString()
                });

                // 4. 幫介紹人加 100 點
                if (referrerDocRef) {
                    await updateDoc(referrerDocRef, {
                        points: increment(100)
                    });
                }

                alert(`🎉 註冊成功！已啟動裂變獎勵！\n您的專屬推廣碼為：【${myMemberCode}】\n獲得註冊見面禮：${myInitialPoints} 點！`);
                window.location.href = 'home.html';

            } catch (error) {
                alert("❌ 註冊失敗：" + error.message);
                regBtn.disabled = false;
                regBtn.innerText = "加入會員，返回體驗";
            }
        });
    </script>
</body>
</html>
