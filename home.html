<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天給你抽 - 尋找你的專專屬香氣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { clay: '#D0826C', forest: '#2E4A3F', sand: '#FAF8F5' }
                }
            }
        }
    </script>
    <style>
        .card-perspective { perspective: 1000px; }
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .card-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; }
        .card-back { transform: rotateY(180deg); }
    </style>
</head>
<body class="bg-sand min-h-screen font-sans">

    <nav class="bg-white shadow-sm px-6 py-4 flex justify-between items-center border-b border-gray-100">
        <div class="text-xl font-bold text-forest tracking-wider">今天給你抽</div>
        <div id="navUserStatus" class="space-x-6 text-sm font-medium text-gray-600">
            <span class="text-gray-400">正在檢查登入狀態...</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-12 text-center">
        <header class="mb-12">
            <h2 class="text-3xl font-bold text-forest mb-3">今天，想抽什麼精油？</h2>
            <p class="text-gray-500 max-w-md mx-auto text-sm">靜下心來，深呼吸三次，憑直覺挑選一張香氣卡片。</p>
        </header>

        <div id="cardsContainer" class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-2xl mx-auto mb-16 card-perspective">
            <p class="text-sm text-gray-400 text-center py-8 col-span-full">正在從雲端盲盒庫調度精油中...</p>
        </div>

        <div id="resultSection" class="hidden bg-white rounded-2xl p-8 shadow-lg max-w-xl mx-auto border border-gray-100">
            <span class="text-xs font-bold uppercase tracking-widest bg-clay/10 text-clay px-3 py-1 rounded-full">今日命定香氣</span>
            <h3 id="resultTitle" class="text-2xl font-bold text-forest mt-4 mb-2">精油名稱</h3>
            <p id="resultDesc" class="text-gray-600 text-sm leading-relaxed mb-8">精油功效...</p>
            
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <button onclick="handleAction('buy')" class="bg-clay text-white px-6 py-3 rounded-lg font-medium hover:bg-opacity-90 transition shadow-md">🛍️ 購買這款精油 ($580 起)</button>
                <button onclick="handleAction('book')" class="bg-forest text-white px-6 py-3 rounded-lg font-medium hover:bg-opacity-90 transition shadow-md">📅 報名近期精油體驗課</button>
            </div>
        </div>
    </main>

    <div id="bookingModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 relative shadow-2xl">
            <button onclick="closeBookingModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-xl">&times;</button>
            <h3 class="text-2xl font-bold text-forest mb-2">預約調香體驗課</h3>
            <p class="text-xs text-gray-400 mb-6">抽中命定香，來親手調配一瓶屬於你的精油吧！</p>
            <form id="bookingForm" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">預約會員姓名</label>
                    <input type="text" id="bookName" readonly class="w-full px-3 py-2 border rounded-lg bg-gray-50 text-gray-500 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">聯絡電話</label>
                    <input type="tel" id="bookPhone" readonly class="w-full px-3 py-2 border rounded-lg bg-gray-50 text-gray-500 text-sm outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">選擇體驗日期</label>
                    <input type="date" id="bookDate" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-clay outline-none text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-700 mb-1">報名人數</label>
                    <select id="bookCount" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-clay outline-none text-sm">
                        <option value="1">1 人體驗</option>
                        <option value="2">2 人同行</option>
                        <option value="3">3 人共學</option>
                        <option value="4">4 人包堂</option>
                    </select>
                </div>
                <button type="submit" class="w-full bg-clay text-white py-2.5 rounded-lg font-medium hover:bg-opacity-90 transition mt-2 shadow-md">確認送出預約</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAq5b6zOX6Czu88eCTWHitKSu7mLnqyxbY",
            authDomain: "today-draw-365ed.firebaseapp.com",
            projectId: "today-draw-365ed",
            storageBucket: "today-draw-365ed.firebasestorage.app",
            messagingSenderId: "118558159958",
            appId: "1:118558159958:web:11f552d3a454128f1837f7",
            measurementId: "G-H37FG8S08X"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserData = null;
        let oilData = []; // 用來存放從 Firebase 撈出來的商品陣列
        let hasDrawn = false;

        // 1. 動態加載雲端上架商品
        async function fetchProducts() {
            const container = document.getElementById('cardsContainer');
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                container.innerHTML = '';
                oilData = [];

                if (querySnapshot.empty) {
                    container.innerHTML = `<p class="text-sm text-gray-400 text-center py-8 col-span-full">主理人還沒有上架商品唷！</p>`;
                    return;
                }

                let index = 0;
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    oilData.push({
                        name: `${data.name} (${data.codeName})`,
                        desc: data.description
                    });

                    // 動態產生前端卡片 HTML
                    const cardMarkup = `
                        <div class="w-full h-72 cursor-pointer" onclick="drawCard(${index}, this)">
                            <div class="card-inner w-full h-full relative rounded-2xl shadow-md bg-white">
                                <div class="card-front absolute inset-0 flex flex-col items-center justify-center bg-forest rounded-2xl text-sand p-6">
                                    <div class="text-4xl mb-4">✨</div>
                                    <h3 class="text-lg font-medium tracking-widest">植感盲盒 ${index + 1}</h3>
                                </div>
                                <div class="card-back absolute inset-0 flex flex-col items-center justify-center bg-white rounded-2xl p-6 border-2 border-clay">
                                    <span class="text-4xl mb-3">${data.emoji || '🌿'}</span>
                                    <h4 class="text-xl font-bold text-gray-800 mb-1">${data.name}</h4>
                                    <p class="text-xs text-clay font-medium">${data.codeName}</p>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardMarkup);
                    index++;
                });

            } catch (error) {
                container.innerHTML = `<p class="text-sm text-red-400 text-center py-8 col-span-full">盲盒調度失敗：${error.message}</p>`;
            }
        }

        // 2. 監聽翻牌抽卡
        window.drawCard = function(index, cardElement) {
            if (hasDrawn) return;
            hasDrawn = true;
            cardElement.querySelector('.card-inner').classList.add('card-flipped');
            setTimeout(() => {
                const resultSection = document.getElementById('resultSection');
                document.getElementById('resultTitle').innerText = oilData[index].name;
                document.getElementById('resultDesc').innerText = oilData[index].desc;
                resultSection.classList.remove('hidden');
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 400);
        }

        // 3. 監聽登入狀態切換
        onAuthStateChanged(auth, async (user) => {
            const navStatus = document.getElementById('navUserStatus');
            if (user) {
                const docRef = doc(db, "members", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    currentUserData = docSnap.data();
                    let adminLink = currentUserData.role === 'admin' ? `<a href="admin.html" class="text-clay hover:underline mr-2">⚙️ 後台管理</a>` : '';
                    
                    navStatus.innerHTML = `
                        ${adminLink}
                        <span class="text-forest font-bold">🌟 你好，${currentUserData.fullName}</span>
                        <button id="logoutBtn" class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded">登出</button>
                    `;
                    document.getElementById('bookName').value = currentUserData.fullName;
                    document.getElementById('bookPhone').value = currentUserData.phone;
                }
                if (localStorage.getItem('pendingAction') === 'book') {
                    localStorage.removeItem('pendingAction');
                    openBookingModal();
                }
                document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
            } else {
                currentUserData = null;
                navStatus.innerHTML = `<a href="index.html" class="bg-forest text-white px-4 py-2 rounded-lg text-xs">加入會員 / 登入</a>`;
            }
        });

        // 核心動線判斷
        window.handleAction = function(actionType) {
            if (!auth.currentUser) {
                alert('為了記錄您的預約與配送資料，請先填寫會員資料唷！');
                localStorage.setItem('pendingAction', actionType);
                window.location.href = 'index.html';
            } else {
                if (actionType === 'book') { openBookingModal(); }
                else { alert('🛍️ 進入購買流程（串接金流中！）'); }
            }
        }

        // 預約表單送出
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const date = document.getElementById('bookDate').value;
            const count = document.getElementById('bookCount').value;
            const currentOil = document.getElementById('resultTitle').innerText;

            try {
                await addDoc(collection(db, "course_bookings"), {
                    uid: auth.currentUser.uid,
                    customerName: currentUserData.fullName,
                    phone: currentUserData.phone,
                    bookingDate: date,
                    peopleCount: parseInt(count),
                    drawnOil: currentOil,
                    status: "已預約",
                    createdAt: new Date().toISOString()
                });
                alert(`🎉 預約成功！`);
                closeBookingModal();
                document.getElementById('bookingForm').reset();
            } catch (error) {
                alert("❌ 預約失敗：" + error.message);
            }
        });

        // 初始化加載
        fetchProducts();
    </script>

    <script>
        function openBookingModal() { document.getElementById('bookingModal').classList.remove('hidden'); }
        function closeBookingModal() { document.getElementById('bookingModal').classList.add('hidden'); }
    </script>
</body>
</html>
