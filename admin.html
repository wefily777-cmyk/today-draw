<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玥石之溫 - 管理者後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { clay: '#D0826C', forest: '#2E4A3F', sand: '#FAF8F5' }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen p-4 font-sans text-gray-800">

    <div class="max-w-4xl mx-auto">
        <!-- 標頭 -->
        <div class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm mb-6 border border-gray-100">
            <div>
                <h1 class="text-2xl font-bold text-forest">👑 玥石之溫・主理人後台</h1>
                <p class="text-xs text-gray-400 mt-1">即時管理盲盒商品庫與上傳實體精油相簿</p>
            </div>
            <a href="home.html" class="text-xs bg-gray-100 text-gray-600 px-4 py-2 rounded-xl hover:bg-gray-200 transition">返回前台首頁</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 左側：上架表單 -->
            <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <h3 class="text-sm font-bold text-forest mb-4 border-b pb-2">✨ 新品上架至櫥窗</h3>
                <form id="uploadForm" class="space-y-4 text-left">
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">精油名稱</label>
                        <input type="text" id="pName" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：大馬士革玫瑰">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">商品英文/代號</label>
                        <input type="text" id="pCode" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：Rose">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">香氣心靈描述</label>
                        <textarea id="pDesc" required rows="3" class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="輸入抽中時顯示的心靈指引文字..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">商品實體照片 (支援手機相機拍照)</label>
                        <input type="file" id="pKeyImage" accept="image/*" required class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-clay/10 file:text-clay hover:file:bg-clay/20">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-forest text-white py-2.5 rounded-xl text-xs font-medium hover:bg-opacity-95 transition shadow-sm">
                        🚀 確認上架至雲端櫥窗
                    </button>
                </form>
            </div>

            <!-- 右側：現有盲盒清單 -->
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-bold text-forest mb-4 border-b pb-2">📦 目前雲端盲盒庫商品</h3>
                <div id="adminProductList" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <p class="text-xs text-gray-400 py-8 col-span-full text-center">正在同步雲端照片清單...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        // 🎯 玥石之溫付費專案金鑰 (大寫 O 正確官方版)
        const firebaseConfig = {
            apiKey: "AIzaSyDO3zBEE275PfxNash3-HsjPRWXGYluI-c",
            authDomain: "poetry-ai-5dd52.firebaseapp.com",
            projectId: "poetry-ai-5dd52",
            storageBucket: "poetry-ai-5dd52.firebasestorage.app",
            messagingSenderId: "433041548580",
            appId: "1:433041548580:web:43808e3a99ea9fbd123fb1",
            measurementId: "G-D3LY5HJLZG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // 👑 綁定詹先生最高權限信箱
        const ADMIN_EMAIL = "qoojude@hotmail.com";

        // 🛡️ 後台權限守衛
        onAuthStateChanged(auth, (user) => {
            if (!user || user.email !== ADMIN_EMAIL) {
                alert("🔒 抱歉，本頁面為玥石之溫主理人專屬。已為您跳轉回首頁。");
                window.location.href = 'home.html';
                return;
            }
            // 權限通過，加載清單
            loadAdminProducts();
        });

        // 🖼️ 處理表單提交（拍照上傳 Storage + 寫入 Firestore）
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const fileInput = document.getElementById('pKeyImage');
            const name = document.getElementById('pName').value;
            const code = document.getElementById('pCode').value;
            const desc = document.getElementById('pDesc').value;

            if (fileInput.files.length === 0) {
                alert("請上傳或拍攝一張商品實體照片唷！");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "⏳ 正在將相簿同步至美國雲端保險箱...";

            try {
                const file = fileInput.files[0];
                // 1. 上傳照片到 Firebase Storage
                const storageRef = ref(storage, 'products/' + Date.now() + '_' + file.name);
                const snapshot = await uploadBytes(storageRef, file);
                const downloadUrl = await getDownloadURL(snapshot.ref);

                // 2. 將包含照片網址的資料寫入 Firestore Database
                await addDoc(collection(db, "products"), {
                    name: name,
                    codeName: code, // 相容原欄位
                    code: code,
                    description: desc,
                    imageUrl: downloadUrl,
                    createdAt: new Date().toISOString()
                });

                alert("🎉 商品實體照成功同步至雲端櫥窗！");
                document.getElementById('uploadForm').reset();
                loadAdminProducts(); // 刷新清單
            } catch (error) {
                alert("❌ 上架失敗：" + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "🚀 確認上架至雲端櫥窗";
            }
        });

        // 📦 加載後台商品清單
        async function loadAdminProducts() {
            const listContainer = document.getElementById('adminProductList');
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                listContainer.innerHTML = '';
                
                if (querySnapshot.empty) {
                    listContainer.innerHTML = `<p class="text-xs text-gray-400 py-8 col-span-full text-center">目前保險箱內空空如也，快拍下第一款精油商品吧！</p>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const p = docSnap.data();
                    listContainer.innerHTML += `
                        <div class="bg-sand/50 p-4 rounded-xl flex items-center justify-between border border-gray-100">
                            <div class="flex items-center gap-3">
                                <img src="${p.imageUrl || 'https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?w=100'}" class="w-12 h-12 object-cover rounded-lg bg-white border">
                                <div class="text-left">
                                    <p class="text-xs font-bold text-gray-800">${p.name}</p>
                                    <p class="text-[10px] text-gray-400 mt-0.5">代號: ${p.codeName || p.code || '---'}</p>
                                </div>
                            </div>
                            <button onclick="deleteProduct('${docSnap.id}')" class="text-[10px] bg-red-50 text-red-500 px-2 py-1 rounded hover:bg-red-100 transition">刪除</button>
                        </div>
                    `;
                });
            } catch (err) {
                listContainer.innerHTML = `<p class="text-xs text-red-400 py-8 col-span-full text-center">加載失敗，請檢查網路狀態。</p>`;
            }
        }

        // 🗑️ 刪除商品功能
        window.deleteProduct = async function(id) {
            if (!confirm("確定要將這款精油從雲端櫥窗下架嗎？")) return;
            try {
                await deleteDoc(doc(db, "products", id));
                alert("已成功下架！");
                loadAdminProducts();
            } catch (e) {
                alert("下架失敗：" + e.message);
            }
        }
    </script>
</body>
</html>
