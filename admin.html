<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玥石之溫 - 管理者後台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { clay: '#D0826C', forest: '#2E4A3F', sand: '#FAF8F5' }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen p-4 font-sans text-gray-800">

    <div class="max-w-6xl mx-auto space-y-6">
        <!-- 標頭 -->
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-6 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-forest">👑 玥石之溫・主理人後台</h1>
                <p class="text-xs text-gray-400 mt-1">即時管理商品價格、照片與顧客匯款對帳</p>
            </div>
            <a href="home.html" class="text-xs bg-gray-100 text-gray-600 px-4 py-2 rounded-xl hover:bg-gray-200 transition">返回前台首頁</a>
        </div>

        <!-- 📊 營運數據看板 -->
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400">待對帳訂單</p>
                <p id="statPendingOrders" class="text-2xl font-black text-clay mt-1">0 <span class="text-xs font-normal">筆</span></p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                <p class="text-xs text-gray-400">已核對/等出貨</p>
                <p id="statPaidOrders" class="text-2xl font-black text-forest mt-1">0 <span class="text-xs font-normal">筆</span></p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 col-span-2 sm:col-span-1">
                <p class="text-xs text-gray-400">總商品數量</p>
                <p id="statTotalProducts" class="text-2xl font-black text-gray-700 mt-1">0 <span class="text-xs font-normal">款</span></p>
            </div>
        </div>

        <!-- 📦 顧客訂單與匯款對帳管理區 -->
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4 border-b pb-3">
                <h3 class="text-base font-bold text-forest flex items-center gap-2">
                    📦 顧客訂單與對帳寄送管理 
                    <span id="newOrderBadge" class="hidden bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full animate-pulse">有新訂單</span>
                </h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="bg-sand/60 text-gray-500 border-b">
                            <th class="p-3">下單時間</th>
                            <th class="p-3">會員/購買品項</th>
                            <th class="p-3">實付金額</th>
                            <th class="p-3">後五碼</th>
                            <th class="p-3">📦 寄送門市 / 地址資訊</th>
                            <th class="p-3">目前狀態</th>
                            <th class="p-3 text-right">對帳操作</th>
                        </tr>
                    </thead>
                    <tbody id="orderListTable">
                        <tr>
                            <td colspan="7" class="text-center py-8 text-gray-400">正在同步雲端對帳資料...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- 🛍️ 商品管理 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 左側：上架/編輯表單 -->
            <div class="md:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h3 id="formTitle" class="text-sm font-bold text-forest">✨ 新品上架至櫥窗</h3>
                    <button id="cancelEditBtn" onclick="resetForm()" class="hidden text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded hover:bg-gray-200">取消編輯</button>
                </div>

                <form id="uploadForm" class="space-y-4 text-left">
                    <input type="hidden" id="editProductId" value="">
                    <input type="hidden" id="existingImageUrl" value="">

                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">精油名稱</label>
                        <input type="text" id="pName" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：大馬士革玫瑰">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">商品英文/代號</label>
                        <input type="text" id="pCode" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：Rose">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">💵 商品售價 ($ TWD)</label>
                        <input type="number" id="pPrice" required min="0" class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：580">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">香氣心靈描述</label>
                        <textarea id="pDesc" required rows="3" class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="輸入抽中時顯示的心靈指引文字..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-700 mb-1">商品實體照片 (編輯時不選擇則保留原圖)</label>
                        <input type="file" id="pKeyImage" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-clay/10 file:text-clay hover:file:bg-clay/20">
                    </div>
                    
                    <button type="submit" id="submitBtn" class="w-full bg-forest text-white py-2.5 rounded-xl text-xs font-medium hover:bg-opacity-95 transition shadow-sm">
                        🚀 確認上架至雲端櫥窗
                    </button>
                </form>
            </div>

            <!-- 右側：現有盲盒清單 -->
            <div class="md:col-span-2 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-bold text-forest mb-4 border-b pb-2">📦 目前雲端盲盒庫商品</h3>
                <div id="adminProductList" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <p class="text-xs text-gray-400 py-8 col-span-full text-center">正在同步雲端照片清單...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO3zBEE275PfxNash3-HsjPRWXGYluI-c",
            authDomain: "poetry-ai-5dd52.firebaseapp.com",
            projectId: "poetry-ai-5dd52",
            storageBucket: "poetry-ai-5dd52.firebasestorage.app",
            messagingSenderId: "433041548580",
            appId: "1:433041548580:web:43808e3a99ea9fbd123fb1",
            measurementId: "G-D3LY5HJLZG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);

        const ADMIN_EMAILS = [
            "qoojude@hotmail.com",
            "a0937034596@gmail.com"
        ];
        let productsCache = {};

        onAuthStateChanged(auth, (user) => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                alert("🔒 抱歉，本頁面為玥石之溫主理人專屬。已為您跳轉回首頁。");
                window.location.href = 'home.html';
                return;
            }
            loadAdminProducts();
            listenRealtimeOrders();
        });

        function listenRealtimeOrders() {
            const ordersRef = collection(db, "order_reports");
            onSnapshot(ordersRef, (snapshot) => {
                let pendingCount = 0;
                let paidCount = 0;
                let tableHTML = "";

                if (snapshot.empty) {
                    document.getElementById('orderListTable').innerHTML = `<tr><td colspan="7" class="text-center py-8 text-gray-400">目前尚無顧客回報訂單。</td></tr>`;
                    updateStats(0, 0);
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const order = docSnap.data();
                    const id = docSnap.id;
                    const dateStr = order.createdAt ? new Date(order.createdAt).toLocaleString('zh-TW', { hour12: false }) : '---';
                    
                    let statusBadge = `<span class="bg-amber-50 text-amber-600 px-2 py-0.5 rounded-full font-bold">待對帳</span>`;
                    if (order.status === '已核對/待出貨') {
                        statusBadge = `<span class="bg-emerald-50 text-emerald-600 px-2 py-0.5 rounded-full font-bold">已核對/待出貨</span>`;
                        paidCount++;
                    } else if (order.status === '已完成出貨') {
                        statusBadge = `<span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded-full font-bold">已完成出貨</span>`;
                    } else if (order.status === '帳款異常') {
                        statusBadge = `<span class="bg-red-50 text-red-600 px-2 py-0.5 rounded-full font-bold">帳款異常</span>`;
                    } else {
                        pendingCount++;
                    }

                    tableHTML += `
                        <tr class="border-b hover:bg-sand/30 transition">
                            <td class="p-3 text-[10px] text-gray-400">${dateStr}</td>
                            <td class="p-3">
                                <p class="font-bold text-gray-800">${order.customerName || '會員'}</p>
                                <p class="text-[10px] text-clay font-bold mt-0.5">${order.productName || '精油'}</p>
                            </td>
                            <td class="p-3 font-black text-clay">$${order.finalPrice || 580}</td>
                            <td class="p-3"><span class="font-mono font-bold bg-clay/10 text-clay px-2 py-1 rounded text-sm">${order.lastFiveDigits || '無'}</span></td>
                            <td class="p-3 text-[11px] text-gray-700">
                                <span class="font-bold text-forest bg-sand px-1.5 py-0.5 rounded border border-gray-200">${order.shipMethod || '7-11取貨'}</span><br>
                                <span class="font-bold text-gray-800">收件人：${order.shipName || '未填'} (${order.shipPhone || '未填'})</span><br>
                                <span class="text-gray-500">${order.shipAddress || '未填寫門市'}</span>
                            </td>
                            <td class="p-3">${statusBadge}</td>
                            <td class="p-3 text-right space-x-1">
                                <button onclick="updateOrderStatus('${id}', '已核對/待出貨')" class="bg-forest text-white px-2 py-1 rounded text-[10px] hover:opacity-90">✅ 入帳</button>
                                <button onclick="updateOrderStatus('${id}', '已完成出貨')" class="bg-blue-600 text-white px-2 py-1 rounded text-[10px] hover:opacity-90">🚚 出貨</button>
                                <button onclick="updateOrderStatus('${id}', '帳款異常')" class="bg-red-50 text-red-600 px-2 py-1 rounded text-[10px] hover:bg-red-100">❌ 異常</button>
                            </td>
                        </tr>
                    `;
                });

                document.getElementById('orderListTable').innerHTML = tableHTML;
                updateStats(pendingCount, paidCount);
            });
        }

        window.updateOrderStatus = async function(orderId, newStatus) {
            try {
                await updateDoc(doc(db, "order_reports", orderId), {
                    status: newStatus,
                    updatedAt: new Date().toISOString()
                });
            } catch (err) {
                alert("修改失敗：" + err.message);
            }
        };

        function updateStats(pending, paid) {
            document.getElementById('statPendingOrders').innerHTML = `${pending} <span class="text-xs font-normal">筆</span>`;
            document.getElementById('statPaidOrders').innerHTML = `${paid} <span class="text-xs font-normal">筆</span>`;
            if (pending > 0) {
                document.getElementById('newOrderBadge').classList.remove('hidden');
            } else {
                document.getElementById('newOrderBadge').classList.add('hidden');
            }
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const editId = document.getElementById('editProductId').value;
            const fileInput = document.getElementById('pKeyImage');
            const name = document.getElementById('pName').value;
            const code = document.getElementById('pCode').value;
            const price = parseInt(document.getElementById('pPrice').value) || 580;
            const desc = document.getElementById('pDesc').value;
            const existingImg = document.getElementById('existingImageUrl').value;

            if (!editId && fileInput.files.length === 0) {
                alert("新品上架請上傳或拍攝一張商品實體照片唷！");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = editId ? "⏳ 正在更新商品資料..." : "⏳ 正在上架至雲端...";

            try {
                let downloadUrl = existingImg;

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const storageRef = ref(storage, 'products/' + Date.now() + '_' + file.name);
                    const snapshot = await uploadBytes(storageRef, file);
                    downloadUrl = await getDownloadURL(snapshot.ref);
                }

                if (editId) {
                    await updateDoc(doc(db, "products", editId), {
                        name: name,
                        codeName: code,
                        code: code,
                        price: price,
                        description: desc,
                        imageUrl: downloadUrl,
                        updatedAt: new Date().toISOString()
                    });
                    alert("🎉 商品資料成功更新！");
                } else {
                    await addDoc(collection(db, "products"), {
                        name: name,
                        codeName: code,
                        code: code,
                        price: price,
                        description: desc,
                        imageUrl: downloadUrl,
                        createdAt: new Date().toISOString()
                    });
                    alert("🎉 商品實體照與價格成功上架至雲端櫥窗！");
                }

                resetForm();
                loadAdminProducts();
            } catch (error) {
                alert("❌ 操作失敗：" + error.message);
            } finally {
                submitBtn.disabled = false;
            }
        });

        async function loadAdminProducts() {
            const listContainer = document.getElementById('adminProductList');
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                listContainer.innerHTML = '';
                productsCache = {};
                
                document.getElementById('statTotalProducts').innerHTML = `${querySnapshot.size} <span class="text-xs font-normal">款</span>`;

                if (querySnapshot.empty) {
                    listContainer.innerHTML = `<p class="text-xs text-gray-400 py-8 col-span-full text-center">目前保險箱內空空如也，快拍下第一款精油商品吧！</p>`;
                    return;
                }

                querySnapshot.forEach((docSnap) => {
                    const p = docSnap.data();
                    productsCache[docSnap.id] = p;

                    listContainer.innerHTML += `
                        <div class="bg-sand/50 p-4 rounded-xl flex items-center justify-between border border-gray-100">
                            <div class="flex items-center gap-3">
                                <img src="${p.imageUrl || 'https://images.unsplash.com/photo-1608571423902-eed4a5ad8108?w=100'}" class="w-12 h-12 object-cover rounded-lg bg-white border">
                                <div class="text-left">
                                    <p class="text-xs font-bold text-gray-800">${p.name}</p>
                                    <p class="text-[10px] text-clay font-bold mt-0.5">$${p.price || 580} TWD</p>
                                    <p class="text-[9px] text-gray-400">代號: ${p.codeName || p.code || '---'}</p>
                                </div>
                            </div>
                            <div class="flex gap-1">
                                <button onclick="editProduct('${docSnap.id}')" class="text-[10px] bg-forest/10 text-forest px-2 py-1 rounded hover:bg-forest/20 transition">✏️ 編輯</button>
                                <button onclick="deleteProduct('${docSnap.id}')" class="text-[10px] bg-red-50 text-red-500 px-2 py-1 rounded hover:bg-red-100 transition">刪除</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                listContainer.innerHTML = `<p class="text-xs text-red-400 py-8 col-span-full text-center">加載失敗，請檢查網路狀態。</p>`;
            }
        }

        window.editProduct = function(id) {
            const p = productsCache[id];
            if (!p) return;

            document.getElementById('editProductId').value = id;
            document.getElementById('pName').value = p.name || '';
            document.getElementById('pCode').value = p.codeName || p.code || '';
            document.getElementById('pPrice').value = p.price || 580;
            document.getElementById('pDesc').value = p.description || '';
            document.getElementById('existingImageUrl').value = p.imageUrl || '';

            document.getElementById('formTitle').innerText = "✏️ 編輯商品資料";
            document.getElementById('submitBtn').innerText = "💾 儲存修改";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        };

        window.resetForm = function() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editProductId').value = '';
            document.getElementById('existingImageUrl').value = '';
            document.getElementById('formTitle').innerText = "✨ 新品上架至櫥窗";
            document.getElementById('submitBtn').innerText = "🚀 確認上架至雲端櫥窗";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        };

        window.deleteProduct = async function(id) {
            if (!confirm("確定要將這款精油從雲端櫥窗下架嗎？")) return;
            try {
                await deleteDoc(doc(db, "products", id));
                alert("已成功下架！");
                loadAdminProducts();
            } catch (e) {
                alert("下架失敗：" + e.message);
            }
        };
    </script>
</body>
</html>
