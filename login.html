<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今天給你抽 - 會員登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        clay: '#D0826C',   /* 落日陶土橘 */
                        forest: '#2E4A3F', /* 森林深綠 */
                        sand: '#FAF8F5',   /* 大地奶色 */
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-forest tracking-wider mb-2">今天給你抽</h1>
            <p class="text-sm text-gray-500">歡迎回來！請輸入您的帳號密碼</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">電子郵件 (帳號)</label>
                <input type="email" id="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="example@email.com">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                <input type="password" id="password" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-clay focus:border-transparent outline-none transition" placeholder="請輸入密碼">
            </div>

            <button type="submit" class="w-full bg-forest text-white py-3 rounded-lg font-medium hover:bg-opacity-90 transition duration-300 shadow-md">
                登入會員，開始抽精油
            </button>

            <div class="text-center mt-6 text-sm text-gray-500">
                還沒有帳號嗎？ <a href="index.html" class="text-clay font-medium hover:underline">立即註冊</a>
            </div>
            <div class="text-center mt-2">
                <a href="home.html" class="text-xs text-gray-400 hover:underline">暫不登入，返回首頁</a>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🔥 你的專屬 Firebase 專案設定資訊
        const firebaseConfig = {
            apiKey: "AIzaSyAq5b6zOX6Czu88eCTWHitKSu7mLnqyxbY",
            authDomain: "today-draw-365ed.firebaseapp.com",
            projectId: "today-draw-365ed",
            storageBucket: "today-draw-365ed.firebasestorage.app",
            messagingSenderId: "118558159958",
            appId: "1:118558159958:web:11f552d3a454128f1837f7",
            measurementId: "G-H37FG8S08X"
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 監聽表單送出事件
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 呼叫 Firebase 登入 API
                await signInWithEmailAndPassword(auth, email, password);

                alert('🎉 登入成功！歡迎回到「今天給你抽」！');
                
                // 成功後，自動跳轉回首頁，首頁的聰明機制會自動載入他的姓名電話
                window.location.href = 'home.html';

            } catch (error) {
                console.error("登入錯誤:", error);
                // 根據常見錯誤給予親切提示
                if (error.code === 'auth/invalid-credential') {
                    alert('❌ 登入失敗：帳號或密碼輸入錯誤，請再確認一下唷！');
                } else {
                    alert('❌ 登入失敗：' + error.message);
                }
            }
        });
    </script>
</body>
</html>
