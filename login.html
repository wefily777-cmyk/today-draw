<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玥石之溫 - 會員登入</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { clay: '#D0826C', forest: '#2E4A3F', sand: '#FAF8F5' }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-8 rounded-3xl shadow-xl max-w-md w-full border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-forest tracking-wider">玥石之溫</h1>
            <p class="text-gray-400 text-xs mt-2">歡迎回來，請登入您的會員帳號</p>
        </div>

        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">電子郵件 (帳號)</label>
                <input type="email" id="email" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm">
            </div>
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-xs font-medium text-gray-700">密碼</label>
                    <!-- 🔑 新增：忘記密碼快捷鈕 -->
                    <button type="button" id="forgetBtn" class="text-xs text-clay hover:underline">忘記密碼？</button>
                </div>
                <input type="password" id="password" required class="w-full px-3 py-2 border rounded-xl focus:ring-2 focus:ring-clay outline-none text-sm">
            </div>

            <button type="submit" class="w-full bg-forest text-white py-3 rounded-xl font-medium hover:bg-opacity-95 transition shadow-md text-sm mt-4">
                會員登入
            </button>
        </form>

        <p class="text-center text-xs text-gray-500 mt-6">
            還不是會員嗎？ <a href="index.html" class="text-clay font-medium hover:underline">立即免費註冊</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🎯 玥石之溫官方正確金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyDO3zBEE275PfxNash3-HsjPRWXGYluI-c",
            authDomain: "poetry-ai-5dd52.firebaseapp.com",
            projectId: "poetry-ai-5dd52",
            storageBucket: "poetry-ai-5dd52.firebasestorage.app",
            messagingSenderId: "433041548580",
            appId: "1:433041548580:web:43808e3a99ea9fbd123fb1",
            measurementId: "G-D3LY5HJLZG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 🛡️ 處理會員登入
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'home.html';
            } catch (error) {
                alert("❌ 登入失敗：請檢查帳號密碼是否正確。");
            }
        });

        // ✉️ 新增：處理忘記密碼發信
        document.getElementById('forgetBtn').addEventListener('click', async () => {
            const emailInput = document.getElementById('email').value.trim();
            
            if (!emailInput) {
                alert("💡 請先在上面的「電子郵件」欄位輸入您的帳號，再點選忘記密碼唷！");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, emailInput);
                alert(`🎉 密碼重設信已成功發送至：\n【${emailInput}】\n請引導顧客至信箱收信，點擊信中連結即可重新設定密碼囉！`);
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    alert("❌ 發送失敗：系統找不到這個電子郵件帳號，請確認是否輸入正確。");
                } else {
                    alert("❌ 發送失敗：" + error.message);
                }
            }
        });
    </script>
</body>
</html>
