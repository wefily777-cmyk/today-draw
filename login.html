<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玥石之溫 - 會員登入 / 註冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { clay: '#D0826C', forest: '#2E4A3F', sand: '#FAF8F5' }
                }
            }
        }
    </script>
</head>
<body class="bg-sand min-h-screen flex items-center justify-center p-4 font-sans text-gray-800">

    <div class="bg-white max-w-md w-full p-8 rounded-3xl shadow-sm border border-gray-100 my-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-forest tracking-wider">玥石之溫</h1>
            <p class="text-xs text-gray-400 mt-1" id="pageSubtitle">探索您的命定香氣與療癒生活</p>
        </div>

        <!-- 頁籤切換 -->
        <div class="flex border-b border-gray-100 mb-6 text-sm font-medium text-center">
            <button id="tabLogin" onclick="switchTab('login')" class="w-1/2 pb-3 border-b-2 border-forest text-forest font-bold">會員登入</button>
            <button id="tabRegister" onclick="switchTab('register')" class="w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600">註冊新帳號</button>
        </div>

        <!-- 登入表單 -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">電子信箱 (Email)</label>
                <input type="email" id="loginEmail" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">密碼</label>
                <input type="password" id="loginPassword" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="••••••••">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-forest text-white py-2.5 rounded-xl text-xs font-medium hover:bg-opacity-95 transition shadow-sm mt-2">
                進入玥石之溫
            </button>
        </form>

        <!-- 註冊表單 -->
        <form id="registerForm" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">真實姓名</label>
                <input type="text" id="regName" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：王小明">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">聯絡電話</label>
                <input type="tel" id="regPhone" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="例如：0912345678">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">🎂 生日（領取壽星專屬好禮）</label>
                <input type="date" id="regBirthday" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">電子信箱 (Email)</label>
                <input type="email" id="regEmail" required class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="your@email.com">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">設定密碼（至少 6 位數）</label>
                <input type="password" id="regPassword" required minlength="6" class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="••••••••">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">🔒 再次確認密碼</label>
                <input type="password" id="regPasswordConfirm" required minlength="6" class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="請再次輸入相同密碼">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-700 mb-1">推薦人推廣碼（選填）</label>
                <input type="text" id="regInviteCode" class="w-full px-3 py-2 border rounded-xl text-sm outline-none focus:ring-2 focus:ring-clay" placeholder="若有朋友推薦請填寫">
            </div>
            <button type="submit" id="regBtn" class="w-full bg-clay text-white py-2.5 rounded-xl text-xs font-medium hover:bg-opacity-95 transition shadow-sm mt-2">
                註冊並開啟療癒之旅
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="home.html" class="text-xs text-gray-400 hover:text-gray-600 transition">暫不登入，先回首頁逛逛</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDO3zBEE275PfxNash3-HsjPRWXGYluI-c",
            authDomain: "poetry-ai-5dd52.firebaseapp.com",
            projectId: "poetry-ai-5dd52",
            storageBucket: "poetry-ai-5dd52.firebasestorage.app",
            messagingSenderId: "433041548580",
            appId: "1:433041548580:web:43808e3a99ea9fbd123fb1",
            measurementId: "G-D3LY5HJLZG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 切換 Tab
        window.switchTab = function(type) {
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');

            if (type === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.className = "w-1/2 pb-3 border-b-2 border-forest text-forest font-bold";
                tabRegister.className = "w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600";
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.className = "w-1/2 pb-3 border-b-2 border-clay text-clay font-bold";
                tabLogin.className = "w-1/2 pb-3 border-b-2 border-transparent text-gray-400 hover:text-gray-600";
            }
        };

        // 登入
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerText = "⏳ 登入中...";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                alert("🎉 歡迎回來玥石之溫！");
                window.location.href = 'home.html';
            } catch (error) {
                alert("❌ 登入失敗：請確認帳號與密碼是否正確。");
            } finally {
                btn.disabled = false;
                btn.innerText = "進入玥石之溫";
            }
        });

        // 註冊
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const birthday = document.getElementById('regBirthday').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            const inviteCode = document.getElementById('regInviteCode').value;
            const btn = document.getElementById('regBtn');

            if (password !== passwordConfirm) {
                alert("⚠️ 兩次輸入的密碼不一致，請再次確認唷！");
                return;
            }

            btn.disabled = true;
            btn.innerText = "⏳ 正在建立個人資料庫...";

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const myMemberCode = 'YS' + Math.floor(100000 + Math.random() * 900000);

                await setDoc(doc(db, "members", user.uid), {
                    uid: user.uid,
                    fullName: name,
                    phone: phone,
                    birthday: birthday,
                    email: email,
                    memberCode: myMemberCode,
                    usedInviteCode: inviteCode || "",
                    points: 50,
                    role: 'member',
                    createdAt: new Date().toISOString()
                });

                alert("🎉 註冊成功！獲得首訪體驗養份 50 點！");
                window.location.href = 'home.html';
            } catch (error) {
                alert("❌ 註冊失敗：" + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "註冊並開啟療癒之旅";
            }
        });
    </script>
</body>
</html>
